<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0d0d1a">
    <meta name="description" content="Abdullah Saeed - بيئة تطوير متكاملة احترافية">
    <title>Abdullah Saeed - بيئة التطوير المتكاملة</title>
    <link rel="manifest" href="data:application/json,{}">

    <style>
        :root {
            --bg-primary: #0a0a14;
            --bg-secondary: #111128;
            --bg-tertiary: #16163a;
            --surface: #1a1a3e;
            --surface-hover: #222255;
            --border: #2a2a55;
            --border-active: #5b4dff;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0c0;
            --text-muted: #6a6a8a;
            --accent: #6c5ce7;
            --accent-glow: #8b7cf0;
            --accent2: #00d4aa;
            --danger: #ff4757;
            --warning: #ffa502;
            --success: #2ed573;
            --gradient-1: linear-gradient(135deg, #6c5ce7, #8b7cf0);
            --gradient-2: linear-gradient(135deg, #0d0d1a, #1a1a3e);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.6);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.7);
            --shadow-glow: 0 0 40px rgba(108, 92, 231, 0.3);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', 'Courier New', monospace;
            --font-sans: 'SF Pro Display', 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            --font-ar: 'Tajawal', 'SF Pro Display', 'Segoe UI', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-ar);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(108, 92, 231, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 60%, rgba(0, 212, 170, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(108, 92, 231, 0.04) 0%, transparent 55%);
        }

        /* تحسين اللمس العام */
        button, .btn, .file-item, .editor-tab, .file-del {
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        /* السماح بتحديد النص داخل المحرر فقط */
        .code-textarea, .line-numbers {
            user-select: text;
            -webkit-user-select: text;
        }

        /* تمرير سلس على الأجهزة اللمسية */
        .sidebar, .file-list, .editor-tabs, .code-textarea, .preview-iframe {
            -webkit-overflow-scrolling: touch;
        }

        /* ============ HEADER ============ */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
            min-height: 52px;
            flex-wrap: wrap;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.3px;
            color: #fff;
            white-space: nowrap;
        }
        .header-logo {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: var(--shadow-glow);
            flex-shrink: 0;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-primary);
            cursor: pointer;
            font-family: var(--font-ar);
            font-size: 0.82rem;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.1px;
            text-decoration: none;
        }
        .btn:hover {
            background: var(--surface-hover);
            border-color: var(--border-active);
            box-shadow: var(--shadow-glow);
            transform: translateY(-1px);
        }
        .btn:active {
            transform: scale(0.96);
            transition: 0.1s;
        }
        .btn-accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.35);
        }
        .btn-accent:hover {
            background: #7b6ff0;
            box-shadow: 0 6px 24px rgba(108, 92, 231, 0.5);
        }
        .btn-success {
            background: var(--success);
            border-color: var(--success);
            color: #000;
            font-weight: 700;
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 0.72rem;
            border-radius: 6px;
        }
        .btn-icon {
            width: 34px;
            height: 34px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1.1rem;
        }

        /* ============ MAIN LAYOUT ============ */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            z-index: 50;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .sidebar-header {
            padding: 14px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            z-index: 5;
        }
        .file-list {
            list-style: none;
            padding: 6px;
            flex: 1;
        }
        .file-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            transition: var(--transition);
            margin: 2px 0;
            border: 1px solid transparent;
            position: relative;
            font-family: var(--font-mono);
            font-size: 0.76rem;
        }
        .file-item:hover {
            background: var(--surface-hover);
            border-color: var(--border);
        }
        .file-item.active {
            background: var(--surface);
            border-color: var(--border-active);
            box-shadow: 0 0 16px rgba(108, 92, 231, 0.2);
            font-weight: 600;
        }
        .file-item .file-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }
        .file-item .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-item .file-actions {
            display: flex;
            gap: 3px;
            opacity: 0;
            transition: var(--transition);
        }
        .file-item:hover .file-actions {
            opacity: 1;
        }
        .file-item .file-del {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--danger);
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .file-item .file-del:hover {
            background: rgba(255, 71, 87, 0.2);
        }

        /* ============ EDITOR AREA ============ */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-primary);
        }
        .editor-tabs {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0;
            scrollbar-width: thin;
        }
        .editor-tab {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            white-space: nowrap;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.73rem;
            letter-spacing: 0.2px;
        }
        .editor-tab.active {
            border-bottom-color: var(--accent);
            color: #fff;
            background: rgba(108, 92, 231, 0.08);
        }
        .editor-tab:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }
        .editor-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
        }
        .line-numbers {
            width: 46px;
            background: var(--bg-secondary);
            color: var(--text-muted);
            padding: 14px 4px;
            text-align: right;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            line-height: 1.65;
            overflow-y: hidden;
            user-select: none;
            -webkit-user-select: none;
            border-left: 1px solid var(--border);
            flex-shrink: 0;
            pointer-events: none;
        }
        .code-textarea {
            flex: 1;
            background: var(--bg-primary);
            color: #e0e0f0;
            border: none;
            padding: 14px 16px;
            font-family: var(--font-mono);
            font-size: 0.82rem;
            line-height: 1.65;
            resize: none;
            outline: none;
            tab-size: 2;
            caret-color: var(--accent-glow);
            overflow: auto;
            white-space: pre;
            letter-spacing: 0.1px;
        }
        .code-textarea::selection {
            background: rgba(108, 92, 231, 0.4);
        }
        .code-textarea::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .code-textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        .code-textarea::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        /* ============ PREVIEW PANEL ============ */
        .preview-panel {
            width: 45%;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: #fff;
            transition: var(--transition);
        }
        .preview-header {
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
            flex-shrink: 0;
            gap: 8px;
        }
        .preview-url {
            flex: 1;
            background: var(--bg-primary);
            padding: 6px 10px;
            border-radius: 20px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent2);
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .preview-iframe {
            flex: 1;
            border: none;
            width: 100%;
            background: #fff;
        }

        /* ============ RESIZE HANDLE ============ */
        .resize-handle {
            width: 5px;
            cursor: col-resize;
            background: var(--border);
            transition: var(--transition);
            flex-shrink: 0;
            position: relative;
            touch-action: none;
        }
        .resize-handle:hover,
        .resize-handle.active {
            background: var(--accent);
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.6);
        }
        .resize-handle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 30px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* ============ STATUS BAR ============ */
        .status-bar {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 4px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.68rem;
            color: var(--text-muted);
            flex-shrink: 0;
            gap: 10px;
            flex-wrap: wrap;
            min-height: 28px;
            font-family: var(--font-mono);
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 4px var(--success);
            }
            50% {
                box-shadow: 0 0 14px var(--success), 0 0 24px var(--success);
            }
        }

        /* ============ MODAL ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            min-width: 340px;
            max-width: 90vw;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }
        .modal h3 {
            margin-bottom: 16px;
            font-size: 1.1rem;
            letter-spacing: -0.2px;
        }
        .modal input,
        .modal select {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: #fff;
            font-family: var(--font-ar);
            font-size: 0.85rem;
            margin-bottom: 10px;
            outline: none;
            transition: var(--transition);
        }
        .modal input:focus,
        .modal select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }
        .modal-btns {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ============ TOAST ============ */
        .toast-container {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 10px 18px;
            border-radius: var(--radius);
            background: var(--surface);
            border: 1px solid var(--border);
            color: #fff;
            font-weight: 600;
            font-size: 0.8rem;
            box-shadow: var(--shadow-md);
            animation: toastIn 0.35s ease, toastOut 0.35s ease 2.5s forwards;
            pointer-events: auto;
            text-align: center;
            font-family: var(--font-ar);
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        /* ============ MOBILE ============ */
        .mobile-nav {
            display: none;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 6px 10px;
            gap: 4px;
            flex-shrink: 0;
        }
        .mobile-nav .btn {
            flex: 1;
            justify-content: center;
            font-size: 0.7rem;
            padding: 8px 6px;
        }
        .mobile-nav .btn.active-mob {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 700;
        }

        @media (max-width: 850px) {
            .sidebar {
                position: fixed;
                right: -280px;
                top: 52px;
                bottom: 0;
                z-index: 150;
                width: 260px;
                min-width: 260px;
                box-shadow: var(--shadow-lg);
                transition: right 0.3s ease;
                border-radius: var(--radius-lg) 0 0 0;
            }
            .sidebar.open {
                right: 0;
            }
            .preview-panel {
                position: fixed;
                left: -100%;
                top: 52px;
                bottom: 0;
                width: 100% !important;
                min-width: 100% !important;
                z-index: 140;
                transition: left 0.3s ease;
                border-radius: var(--radius-lg) 0 0 0;
            }
            .preview-panel.open {
                left: 0;
            }
            .editor-panel {
                flex: 1;
                width: 100%;
            }
            .resize-handle {
                display: none;
            }
            .mobile-nav {
                display: flex;
            }
            .header-actions .btn span.lbl {
                display: none;
            }
            .header-actions .btn {
                padding: 8px 10px;
                font-size: 0.9rem;
            }
            .header-brand {
                font-size: 1rem;
            }
        }
        @media (max-width: 480px) {
            .header {
                padding: 6px 10px;
                gap: 6px;
                min-height: 44px;
            }
            .header-logo {
                width: 28px;
                height: 28px;
                font-size: 1rem;
            }
            .header-brand {
                font-size: 0.85rem;
                gap: 6px;
            }
            .btn {
                padding: 6px 8px;
                font-size: 0.68rem;
            }
            .editor-tab {
                padding: 8px 10px;
                font-size: 0.68rem;
            }
            .line-numbers {
                width: 32px;
                font-size: 0.65rem;
                padding: 10px 2px;
            }
            .code-textarea {
                font-size: 0.7rem;
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header class="header">
        <div class="header-brand">
            <div class="header-logo">⚡</div>
            <span>Abdullah Saeed</span>
            <span style="font-size:0.65rem;color:var(--accent2);font-weight:500;background:rgba(0,212,170,0.12);padding:3px 8px;border-radius:20px;">PRO</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-sm" onclick="newFile()" title="ملف جديد">📄 <span class="lbl">جديد</span></button>
            <button class="btn btn-sm" onclick="saveProject()" title="حفظ المشروع">💾 <span class="lbl">حفظ</span></button>
            <button class="btn btn-sm btn-accent" onclick="refreshPreview()" title="تشغيل السيرفر والمعاينة">▶️ <span class="lbl">تشغيل</span></button>
            <button class="btn btn-sm btn-success" onclick="exportProject()" title="تصدير إلى APK / HTML">📦 <span class="lbl">تصدير</span></button>
            <button class="btn btn-sm" onclick="openPermissions()" title="إدارة الأذونات">🔐 <span class="lbl">أذونات</span></button>
            <button class="btn btn-sm" onclick="toggleSidebar()" id="btn-sidebar" title="الملفات">📁</button>
            <button class="btn btn-sm" onclick="togglePreview()" id="btn-preview" title="المعاينة">🖥️</button>
        </div>
    </header>

    <!-- ==================== MAIN ==================== -->
    <div class="main-container" id="mainContainer">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>📁 ملفات المشروع</span>
                <button class="btn btn-sm" onclick="newFile()" style="padding:4px 8px;font-size:0.7rem;">+</button>
            </div>
            <ul class="file-list" id="fileList"></ul>
            <div style="padding:10px;border-top:1px solid var(--border);">
                <button class="btn btn-sm" onclick="newProject()" style="width:100%;justify-content:center;">🆕 مشروع جديد</button>
            </div>
        </aside>

        <!-- PREVIEW -->
        <div class="preview-panel" id="previewPanel">
            <div class="preview-header">
                <span>🌐 معاينة مباشرة</span>
                <span class="preview-url" id="previewUrl">localhost:5500</span>
                <button class="btn btn-sm" onclick="refreshPreview()" title="تحديث">🔄</button>
                <button class="btn btn-sm" onclick="togglePreview()" title="إغلاق">✕</button>
            </div>
            <iframe class="preview-iframe" id="previewIframe" sandbox="allow-scripts allow-forms allow-popups allow-modals allow-downloads" title="معاينة"></iframe>
        </div>

        <!-- RESIZE HANDLE -->
        <div class="resize-handle" id="resizeHandle"></div>

        <!-- EDITOR -->
        <div class="editor-panel" id="editorPanel">
            <div class="editor-tabs" id="editorTabs"></div>
            <div class="editor-wrapper">
                <div class="line-numbers" id="lineNumbers">1</div>
                <textarea class="code-textarea" id="codeEditor" placeholder="// ابدأ كتابة الكود هنا...&#10;// Abdullah Saeed IDE" spellcheck="false"></textarea>
            </div>
        </div>
    </div>

    <!-- ==================== MOBILE NAV ==================== -->
    <nav class="mobile-nav" id="mobileNav">
        <button class="btn" id="mobBtnFiles" onclick="toggleSidebar()">📁 الملفات</button>
        <button class="btn active-mob" id="mobBtnEditor" onclick="showEditorMobile()">✍️ المحرر</button>
        <button class="btn" id="mobBtnPreview" onclick="togglePreview()">🖥️ المعاينة</button>
    </nav>

    <!-- ==================== STATUS BAR ==================== -->
    <div class="status-bar">
        <span><span class="status-dot"></span> السيرفر الداخلي: <strong id="statusServer">نشط</strong></span>
        <span>المشروع: <strong id="statusProject">مشروعي الأول</strong></span>
        <span id="statusFileInfo">HTML • سطر 1</span>
        <span>Abdullah Saeed © 2026</span>
    </div>

    <!-- ==================== MODAL CONTAINER ==================== -->
    <div id="modalContainer"></div>
    <!-- ==================== TOAST CONTAINER ==================== -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            // ==================== APP STATE ====================
            const APP_NAME = 'Abdullah Saeed';
            const APP_VERSION = '3.0.1';

            let state = {
                projects: {},
                currentProjectId: 'default',
                files: [],
                activeFileId: null,
                sidebarOpen: true,
                previewOpen: true,
                serverActive: true,
            };

            // ==================== DOM REFS ====================
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            const sidebar = $('#sidebar');
            const previewPanel = $('#previewPanel');
            const fileList = $('#fileList');
            const editorTabs = $('#editorTabs');
            const codeEditor = $('#codeEditor');
            const lineNumbers = $('#lineNumbers');
            const previewIframe = $('#previewIframe');
            const previewUrl = $('#previewUrl');
            const statusServer = $('#statusServer');
            const statusProject = $('#statusProject');
            const statusFileInfo = $('#statusFileInfo');
            const modalContainer = $('#modalContainer');
            const toastContainer = $('#toastContainer');
            const resizeHandle = $('#resizeHandle');
            const mobileNav = $('#mobileNav');

            // ==================== INIT ====================
            function init() {
                loadAllProjects();
                if (!state.projects[state.currentProjectId]) {
                    createDefaultProject();
                }
                loadProject(state.currentProjectId);
                if (state.files.length > 0 && !state.activeFileId) {
                    state.activeFileId = state.files[0].id;
                }
                renderAll();
                updatePreview();
                updateLineNumbers();
                setupResizeHandle();
                setupKeyboardShortcuts();
                updateStatusBar();
                updateMobileNav();

                // Auto-save on edit
                codeEditor.addEventListener('input', () => {
                    saveCurrentFileContent();
                    updateLineNumbers();
                    updateStatusBar();
                });
                codeEditor.addEventListener('scroll', () => {
                    syncLineNumbersScroll();
                });
                codeEditor.addEventListener('keydown', (e) => {
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        const start = codeEditor.selectionStart;
                        const end = codeEditor.selectionEnd;
                        codeEditor.value = codeEditor.value.substring(0, start) + '  ' + codeEditor
                            .value.substring(end);
                        codeEditor.selectionStart = codeEditor.selectionEnd = start + 2;
                        saveCurrentFileContent();
                    }
                });

                window.addEventListener('resize', handleResize);
                handleResize();

                console.log(`✅ ${APP_NAME} v${APP_VERSION} - بيئة التطوير جاهزة`);
                console.log('🖥️ السيرفر الداخلي يعمل على المنفذ 5500');
                console.log('📁 المشاريع محفوظة في التخزين المحلي');
                showToast('✅ ' + APP_NAME + ' جاهز للعمل');
            }

            function handleResize() {
                const mobile = window.innerWidth <= 850;
                if (mobile) {
                    // على الجوال، إذا كان كلا اللوحين مفتوحين، نغلق المعاينة تلقائياً
                    if (state.sidebarOpen && state.previewOpen) {
                        state.previewOpen = false;
                        previewPanel.classList.remove('open');
                    }
                    // نتأكد أن السايدبار في وضعية الفتح الصحيحة
                    sidebar.classList.toggle('open', state.sidebarOpen);
                    previewPanel.classList.toggle('open', state.previewOpen);
                } else {
                    // شاشة كبيرة: إعادة التعيين إلى العرض الطبيعي
                    sidebar.style.display = state.sidebarOpen ? 'flex' : 'none';
                    sidebar.style.minWidth = state.sidebarOpen ? '260px' : '0';
                    sidebar.style.width = state.sidebarOpen ? '260px' : '0';
                    previewPanel.style.display = state.previewOpen ? 'flex' : 'none';
                    previewPanel.style.width = '45%';
                    previewPanel.style.minWidth = '320px';
                    sidebar.classList.remove('open');
                    previewPanel.classList.remove('open');
                }
                updateMobileNav();
            }

            // ==================== PROJECT MANAGEMENT ====================
            function createDefaultProject() {
                const defaultProject = {
                    id: 'default',
                    name: 'مشروعي الأول',
                    files: [{
                        id: genId(),
                        name: 'index.html',
                        type: 'html',
                        content: `<!DOCTYPE html>
        <html lang="ar" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>تطبيق Abdullah Saeed</title>
            <style>
                * { margin:0; padding:0; box-sizing:border-box; }
                body {
                    font-family: 'Tajawal', 'Segoe UI', sans-serif;
                    background: linear-gradient(135deg, #0a0a14, #1a1a3e);
                    color: #fff;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    min-height: 100vh;
                    text-align: center;
                    padding: 20px;
                }
                .card {
                    background: rgba(26,26,62,0.8);
                    border: 1px solid #2a2a55;
                    border-radius: 20px;
                    padding: 40px 30px;
                    max-width: 450px;
                    width: 100%;
                    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
                    backdrop-filter: blur(10px);
                }
                h1 {
                    font-size: 2rem;
                    margin-bottom: 8px;
                    background: linear-gradient(135deg, #6c5ce7, #00d4aa);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                    font-weight: 900;
                }
                p { color: #a0a0c0; margin: 12px 0 20px; line-height: 1.6; }
                .btn {
                    display: inline-block;
                    padding: 12px 28px;
                    background: #6c5ce7;
                    color: #fff;
                    border-radius: 30px;
                    text-decoration: none;
                    font-weight: 700;
                    transition: 0.3s;
                    border: none;
                    cursor: pointer;
                    font-size: 1rem;
                }
                .btn:hover { background: #8b7cf0; box-shadow: 0 8px 30px rgba(108,92,231,0.4); }
            </style>
        </head>
        <body>
            <div class="card">
                <h1>🚀 Abdullah Saeed</h1>
                <p>تم إنشاء هذا التطبيق باستخدام بيئة التطوير المتكاملة <strong>Abdullah Saeed</strong></p>
                <p>السيرفر الداخلي يعمل ✓ | المعاينة مباشرة ✓</p>
                <button class="btn" onclick="alert('مرحباً بك في Abdullah Saeed! 🎉')">اضغط هنا</button>
            </div>
        </body>
        </html>`
                    }, {
                        id: genId(),
                        name: 'style.css',
                        type: 'css',
                        content: `/* Abdullah Saeed - ملف الأنماط */
        :root {
            --primary: #6c5ce7;
            --accent: #00d4aa;
            --bg: #0a0a14;
        }
        /* أضف أنماطك هنا */`
                    }, {
                        id: genId(),
                        name: 'script.js',
                        type: 'js',
                        content: `// Abdullah Saeed - ملف الجافاسكريبت
        console.log('🚀 Abdullah Saeed App Ready!');
        // أضف كودك هنا`
                    }],
                    createdAt: Date.now(),
                };
                state.projects['default'] = defaultProject;
                saveAllProjects();
            }

            function loadAllProjects() {
                try {
                    const data = localStorage.getItem('abdullah_saeed_projects');
                    if (data) state.projects = JSON.parse(data);
                } catch (e) {
                    state.projects = {};
                }
            }

            function saveAllProjects() {
                try {
                    localStorage.setItem('abdullah_saeed_projects', JSON.stringify(state.projects));
                } catch (e) {
                    showToast('⚠️ فشل الحفظ - الذاكرة ممتلئة');
                }
            }

            function loadProject(projectId) {
                const project = state.projects[projectId];
                if (!project) return;
                state.currentProjectId = projectId;
                state.files = JSON.parse(JSON.stringify(project.files));
                state.activeFileId = state.files.length > 0 ? state.files[0].id : null;
                statusProject.textContent = project.name;
                renderAll();
                updatePreview();
                updateStatusBar();
            }

            function saveCurrentProject() {
                if (state.projects[state.currentProjectId]) {
                    state.projects[state.currentProjectId].files = JSON.parse(JSON.stringify(state.files));
                    state.projects[state.currentProjectId].updatedAt = Date.now();
                    saveAllProjects();
                }
            }

            // ==================== FILE MANAGEMENT ====================
            function genId() { return 'f_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }

            function getActiveFile() {
                return state.files.find(f => f.id === state.activeFileId) || state.files[0] || null;
            }

            function saveCurrentFileContent() {
                const file = getActiveFile();
                if (file) {
                    file.content = codeEditor.value;
                    saveCurrentProject();
                }
            }

            function setActiveFile(fileId) {
                saveCurrentFileContent();
                state.activeFileId = fileId;
                const file = getActiveFile();
                if (file) {
                    codeEditor.value = file.content;
                }
                updateLineNumbers();
                renderAll();
                updateStatusBar();
            }

            function newFile() {
                showModal('ملف جديد', `
                    <input type="text" id="newFileName" placeholder="اسم الملف (مثال: app.js)" value="newfile.html">
                    <select id="newFileType">
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="js">JavaScript</option>
                        <option value="txt">نص عادي</option>
                    </select>
                    <div class="modal-btns">
                        <button class="btn btn-sm" onclick="closeModal()">إلغاء</button>
                        <button class="btn btn-sm btn-accent" id="confirmNewFile">إنشاء</button>
                    </div>
                `);
                document.getElementById('confirmNewFile').addEventListener('click', () => {
                    const name = document.getElementById('newFileName').value.trim();
                    const type = document.getElementById('newFileType').value;
                    if (!name) { showToast('⚠️ الرجاء إدخال اسم الملف'); return; }
                    const file = {
                        id: genId(),
                        name: name.includes('.') ? name : name + '.' + (type === 'txt' ? 'txt' : type),
                        type: type,
                        content: type === 'html' ?
                            '<!DOCTYPE html>\n<html>\n<head><title>New</title></head>\n<body>\n\n</body>\n</html>' :
                            type === 'css' ? '/* أنماط جديدة */\n' : type === 'js' ?
                            '// كود جديد\nconsole.log("Hello from Abdullah Saeed!");\n' : ''
                    };
                    state.files.push(file);
                    state.activeFileId = file.id;
                    codeEditor.value = file.content;
                    saveCurrentProject();
                    renderAll();
                    updatePreview();
                    updateLineNumbers();
                    closeModal();
                    showToast('✅ تم إنشاء: ' + file.name);
                });
            }

            function deleteFile(fileId) {
                if (state.files.length <= 1) {
                    showToast('⚠️ لا يمكن حذف الملف الوحيد');
                    return;
                }
                const file = state.files.find(f => f.id === fileId);
                if (!file) return;
                if (confirm('هل أنت متأكد من حذف "' + file.name + '"؟')) {
                    state.files = state.files.filter(f => f.id !== fileId);
                    if (state.activeFileId === fileId) {
                        state.activeFileId = state.files[0]?.id || null;
                    }
                    saveCurrentProject();
                    const active = getActiveFile();
                    if (active) codeEditor.value = active.content;
                    renderAll();
                    updatePreview();
                    updateLineNumbers();
                    showToast('🗑️ تم حذف: ' + file.name);
                }
            }

            function newProject() {
                showModal('مشروع جديد', `
                    <input type="text" id="newProjectName" placeholder="اسم المشروع" value="مشروع جديد">
                    <div class="modal-btns">
                        <button class="btn btn-sm" onclick="closeModal()">إلغاء</button>
                        <button class="btn btn-sm btn-accent" id="confirmNewProject">إنشاء</button>
                    </div>
                `);
                document.getElementById('confirmNewProject').addEventListener('click', () => {
                    const name = document.getElementById('newProjectName').value.trim() || 'مشروع جديد';
                    const projectId = 'proj_' + Date.now();
                    const project = {
                        id: projectId,
                        name: name,
                        files: [{
                            id: genId(),
                            name: 'index.html',
                            type: 'html',
                            content: '<!DOCTYPE html>\n<html>\n<head>\n  <title>' + name +
                                '</title>\n</head>\n<body>\n  <h1>🚀 ' + name +
                                '</h1>\n  <p>تم الإنشاء بواسطة Abdullah Saeed</p>\n</body>\n</html>'
                        }],
                        createdAt: Date.now(),
                    };
                    state.projects[projectId] = project;
                    saveAllProjects();
                    loadProject(projectId);
                    closeModal();
                    showToast('✅ تم إنشاء المشروع: ' + name);
                });
            }

            // ==================== PREVIEW / INTERNAL SERVER ====================
            function updatePreview() {
                const htmlFile = state.files.find(f => f.type === 'html') || state.files[0];
                const cssFiles = state.files.filter(f => f.type === 'css');
                const jsFiles = state.files.filter(f => f.type === 'js');

                let htmlContent = htmlFile ? htmlFile.content : '<html><body></body></html>';
                let cssContent = cssFiles.map(f => f.content).join('\n');
                let jsContent = jsFiles.map(f => f.content).join('\n');

                let finalHtml = htmlContent;
                if (cssContent && !finalHtml.includes('<style>') && !finalHtml.includes('style.css')) {
                    finalHtml = finalHtml.replace('</head>',
                        '<style id="abdullah-injected-css">\n' + cssContent + '\n</style>\n</head>');
                }
                if (jsContent && !finalHtml.includes('script.js')) {
                    finalHtml = finalHtml.replace('</body>',
                        '<script id="abdullah-injected-js">\n' + jsContent + '\n<\/script>\n</body>');
                }
                if (!finalHtml.includes('<head') && !finalHtml.includes('<body')) {
                    finalHtml = `<!DOCTYPE html>\n<html><head><meta charset="UTF-8"><style>${cssContent}</style></head><body>${finalHtml}<script>${jsContent}<\/script></body></html>`;
                }

                const blob = new Blob([finalHtml], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                previewIframe.src = url;
                previewUrl.textContent = 'localhost:5500/' + (htmlFile ? htmlFile.name : 'index.html');
                statusServer.textContent = 'نشط';
                statusServer.style.color = 'var(--success)';
            }

            function refreshPreview() {
                saveCurrentFileContent();
                updatePreview();
                showToast('🔄 تم تحديث المعاينة - السيرفر يعمل');
                previewPanel.style.boxShadow = '0 0 30px rgba(0,212,170,0.5)';
                setTimeout(() => { previewPanel.style.boxShadow = ''; }, 600);
            }

            // ==================== EXPORT ====================
            function exportProject() {
                saveCurrentFileContent();
                const htmlFile = state.files.find(f => f.type === 'html') || state.files[0];
                const cssFiles = state.files.filter(f => f.type === 'css');
                const jsFiles = state.files.filter(f => f.type === 'js');

                let htmlContent = htmlFile ? htmlFile.content : '';
                let cssContent = cssFiles.map(f => f.content).join('\n');
                let jsContent = jsFiles.map(f => f.content).join('\n');

                if (!htmlContent.includes('<style') && cssContent) {
                    htmlContent = htmlContent.replace('</head>', '<style>\n' + cssContent + '\n</style>\n</head>');
                }
                if (!htmlContent.includes('<script') && jsContent) {
                    htmlContent = htmlContent.replace('</body>', '<script>\n' + jsContent + '\n<\/script>\n</body>');
                }
                if (!htmlContent.includes('<head')) {
                    htmlContent =
                        `<!DOCTYPE html>\n<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Abdullah Saeed App</title><style>${cssContent}</style></head><body>${htmlContent}<script>${jsContent}<\/script></body></html>`;
                }

                showModal('📦 تصدير المشروع', `
                    <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px;">اختر طريقة التصدير:</p>
                    <div class="modal-btns" style="flex-direction:column;gap:8px;">
                        <button class="btn btn-accent" id="exportHtml" style="width:100%;justify-content:center;">📄 تصدير كملف HTML</button>
                        <button class="btn" id="exportPWA" style="width:100%;justify-content:center;">📱 حزمة PWA (قابلة للتثبيت)</button>
                        <button class="btn" id="exportInfo" style="width:100%;justify-content:center;">📋 معلومات تحويل APK</button>
                        <button class="btn btn-sm" onclick="closeModal()" style="width:100%;justify-content:center;">إلغاء</button>
                    </div>
                `);

                document.getElementById('exportHtml').addEventListener('click', () => {
                    const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
                    downloadBlob(blob, 'abdullah-saeed-app.html');
                    closeModal();
                    showToast('✅ تم تصدير ملف HTML بنجاح');
                });
                document.getElementById('exportPWA').addEventListener('click', () => {
                    const manifest = {
                        name: 'Abdullah Saeed App',
                        short_name: 'ASApp',
                        start_url: '.',
                        display: 'standalone',
                        background_color: '#0a0a14',
                        theme_color: '#6c5ce7',
                        icons: [{ src: 'icon.png', sizes: '192x192', type: 'image/png' }]
                    };
                    const fullHtml = htmlContent.replace('</head>',
                        '<link rel="manifest" href="data:application/json,' + encodeURIComponent(JSON
                            .stringify(manifest)) + '">\n</head>');
                    const blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
                    downloadBlob(blob, 'abdullah-saeed-pwa.html');
                    closeModal();
                    showToast('✅ تم تصدير حزمة PWA');
                });
                document.getElementById('exportInfo').addEventListener('click', () => {
                    closeModal();
                    showToast(
                        'ℹ️ لتحويل HTML إلى APK: استخدم WebView في Android Studio أو أداة مثل PWABuilder أو CapacitorJS');
                });
            }

            function downloadBlob(blob, filename) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            // ==================== PERMISSIONS ====================
            function openPermissions() {
                showModal('🔐 إدارة الأذونات', `
                    <p style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:14px;">إدارة أذونات تطبيق Abdullah Saeed:</p>
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        <button class="btn" id="permNotify" style="width:100%;justify-content:center;">🔔 طلب إذن الإشعارات</button>
                        <button class="btn" id="permGeo" style="width:100%;justify-content:center;">📍 طلب إذن الموقع</button>
                        <button class="btn" id="permStorage" style="width:100%;justify-content:center;">💾 حالة التخزين المحلي</button>
                        <button class="btn" id="permCamera" style="width:100%;justify-content:center;">📷 طلب إذن الكاميرا</button>
                        <button class="btn btn-sm" onclick="closeModal()" style="width:100%;justify-content:center;">إغلاق</button>
                    </div>
                    <p style="font-size:0.7rem;color:var(--text-muted);margin-top:10px;">ملاحظة: الأذونات تخضع لسياسات المتصفح</p>
                `);

                document.getElementById('permNotify').addEventListener('click', () => {
                    if ('Notification' in window) {
                        Notifi
