<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikSaver - تحميل فيديوهات تيك توك بدون علامة مائية</title>
    <style>
        :root {
            --primary: #FE2C55;
            --primary-dark: #D91A46;
            --bg: #121212;
            --bg-card: #1E1E1E;
            --bg-input: #2A2A2A;
            --text: #FFFFFF;
            --text-secondary: #B0B0B0;
            --border: #333333;
            --success: #25F4EE;
            --error: #FF4D4F;
            --warning: #FFC107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 35px 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #25F4EE, #FE2C55, #FF0050);
            border-radius: 0 0 10px 10px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #FE2C55, #FF0050);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            box-shadow: 0 8px 25px rgba(254, 44, 85, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-icon svg {
            width: 35px;
            height: 35px;
            fill: white;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #25F4EE, #FE2C55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(254, 44, 85, 0.1);
        }

        .input-wrapper input::placeholder {
            color: #666;
        }

        .input-icon {
            position: absolute;
            right: 15px;
            color: var(--text-secondary);
            pointer-events: none;
            z-index: 1;
        }

        .clear-btn {
            position: absolute;
            left: 10px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            display: none;
            z-index: 2;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .clear-btn.visible {
            display: flex;
        }

        .paste-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: var(--bg-input);
            border: 2px dashed var(--border);
            color: var(--text-secondary);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-family: inherit;
        }

        .paste-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(254, 44, 85, 0.05);
        }

        .download-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .download-btn:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(254, 44, 85, 0.3);
        }

        .download-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-shine {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255, 255, 255, 0.2) 50%,
                transparent 60%
            );
            animation: shine 2s infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .preview-section {
            margin-top: 25px;
            display: none;
            animation: fadeInUp 0.5s ease;
        }

        .preview-section.show {
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .preview-card {
            background: var(--bg-input);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        .preview-header {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .preview-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .quality-badge {
            background: linear-gradient(135deg, #25F4EE, #00D4CC);
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .preview-thumbnail {
            width: 100%;
            aspect-ratio: 9/16;
            object-fit: cover;
            display: block;
            background: #000;
            max-height: 400px;
        }

        .preview-actions {
            display: flex;
            gap: 10px;
            padding: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-download {
            background: var(--primary);
            color: white;
        }

        .btn-download:hover {
            background: var(--primary-dark);
        }

        .btn-share {
            background: var(--bg-input);
            color: var(--text);
            border: 2px solid var(--border);
        }

        .btn-share:hover {
            border-color: var(--primary);
            background: rgba(254, 44, 85, 0.1);
        }

        .progress-container {
            margin-top: 15px;
            display: none;
        }

        .progress-container.show {
            display: block;
        }

        .progress-bar-wrapper {
            background: var(--bg-input);
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #25F4EE, #FE2C55);
            border-radius: 20px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: var(--error);
        }

        .toast.success {
            background: #00C853;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: var(--success);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .watermark-notice {
            margin-top: 20px;
            padding: 12px 15px;
            background: rgba(37, 244, 238, 0.1);
            border: 1px solid rgba(37, 244, 238, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--success);
        }

        .watermark-notice svg {
            flex-shrink: 0;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 25px 15px;
                border-radius: 15px;
            }
            h1 {
                font-size: 22px;
            }
            .stats {
                gap: 20px;
            }
            .preview-actions {
                flex-direction: column;
            }
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/>
                </svg>
            </div>
            <h1>TikSaver</h1>

        </div>

        <!-- Input -->
        <div class="input-group">
            <label>🎯 رابط الفيديو</label>
            <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                </svg>
                <input 
                    type="text" 
                    id="videoUrl" 
                    placeholder="الصق رابط فيديو تيك توك هنا..."
                    autocomplete="off"
                >
                <button class="clear-btn" id="clearBtn" title="مسح">✕</button>
            </div>
        </div>

        <!-- Paste Button -->
        <button class="paste-btn" id="pasteBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            لصق من الحافظة
        </button>

        <!-- Download Button -->
        <button class="download-btn" id="downloadBtn" disabled>
            <span class="btn-text" id="btnText">📥 تحميل الفيديو</span>
            <span class="spinner" id="spinner" style="display:none;"></span>
            <div class="btn-shine"></div>
        </button>

        <!-- Progress -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar-wrapper">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p class="progress-text" id="progressText">جاري التحميل... 0%</p>
        </div>

        <!-- Preview -->
        <div class="preview-section" id="previewSection">
            <div class="preview-card">
                <div class="preview-header">
                    <span class="preview-title" id="previewTitle">فيديو تيك توك</span>
                    <span class="quality-badge">⚡ بدون علامة مائية</span>
                </div>
                <img class="preview-thumbnail" id="previewThumbnail" alt="معاينة الفيديو">
                <div class="preview-actions">
                    <button class="action-btn btn-download" id="redownloadBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        تحميل الآن
                    </button>
                    <button class="action-btn btn-share" id="shareBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="18" cy="5" r="3"/>
                            <circle cx="6" cy="12" r="3"/>
                            <circle cx="18" cy="19" r="3"/>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                        </svg>
                        مشاركة
                    </button>
                </div>
            </div>
        </div>

        <!-- Watermark Notice -->
        <div class="watermark-notice">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span>يتم تحميل الفيديو بجودة عالية وبدون علامة مائية تماماً</span>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalDownloads">0</div>
                <div class="stat-label">تحميل اليوم</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">HD</div>
                <div class="stat-label">جودة الفيديو</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">✓</div>
                <div class="stat-label">بدون علامة مائية</div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== API Configuration ====================
        const TIKWM_API = 'https://www.tikwm.com/api/';

        // ==================== DOM Elements ====================
        const videoUrlInput = document.getElementById('videoUrl');
        const clearBtn = document.getElementById('clearBtn');
        const pasteBtn = document.getElementById('pasteBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const previewSection = document.getElementById('previewSection');
        const previewTitle = document.getElementById('previewTitle');
        const previewThumbnail = document.getElementById('previewThumbnail');
        const redownloadBtn = document.getElementById('redownloadBtn');
        const shareBtn = document.getElementById('shareBtn');
        const toast = document.getElementById('toast');
        const totalDownloadsEl = document.getElementById('totalDownloads');

        // ==================== State ====================
        let currentVideoData = null;
        let isDownloading = false;
        let downloadCount = parseInt(localStorage.getItem('tiktokDownloadCount') || '0');

        // Update download count display
        totalDownloadsEl.textContent = downloadCount;

        // ==================== Event Listeners ====================

        // Input events
        videoUrlInput.addEventListener('input', handleInputChange);
        videoUrlInput.addEventListener('paste', () => setTimeout(handleInputChange, 100));
        clearBtn.addEventListener('click', clearInput);
        pasteBtn.addEventListener('click', pasteFromClipboard);
        downloadBtn.addEventListener('click', fetchAndDownload);
        redownloadBtn.addEventListener('click', () => downloadVideoDirect(currentVideoData?.videoUrl, currentVideoData?.title));
        shareBtn.addEventListener('click', shareVideo);

        // ==================== Functions ====================

        function handleInputChange() {
            const hasValue = videoUrlInput.value.trim().length > 0;
            clearBtn.classList.toggle('visible', hasValue);
            downloadBtn.disabled = !isValidTikTokUrl(videoUrlInput.value.trim());
            if (!hasValue && currentVideoData) {
                resetPreview();
            }
        }

        function isValidTikTokUrl(url) {
            if (!url) return false;
            const tiktokPatterns = [
                /https?:\/\/(www\.)?tiktok\.com\/@[\w.-]+\/video\/\d+/i,
                /https?:\/\/(www\.)?tiktok\.com\/t\/\w+/i,
                /https?:\/\/vm\.tiktok\.com\/\w+/i,
                /https?:\/\/vt\.tiktok\.com\/\w+/i,
                /https?:\/\/(m\.)?tiktok\.com\/v\/\d+/i
            ];
            return tiktokPatterns.some(pattern => pattern.test(url));
        }

        function clearInput() {
            videoUrlInput.value = '';
            clearBtn.classList.remove('visible');
            downloadBtn.disabled = true;
            resetPreview();
            videoUrlInput.focus();
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    videoUrlInput.value = text.trim();
                    handleInputChange();
                    if (isValidTikTokUrl(text.trim())) {
                        showToast('✅ تم لصق الرابط بنجاح', 'success');
                    } else {
                        showToast('⚠️ الرابط المنسوخ لا يبدو رابط تيك توك صحيح', 'error');
                    }
                } else {
                    showToast('📋 الحافظة فارغة', 'error');
                }
            } catch (err) {
                // Fallback for older browsers
                const text = prompt('الصق رابط الفيديو هنا:');
                if (text) {
                    videoUrlInput.value = text.trim();
                    handleInputChange();
                }
            }
        }

        function setLoading(loading) {
            isDownloading = loading;
            downloadBtn.disabled = loading || !isValidTikTokUrl(videoUrlInput.value.trim());
            if (loading) {
                btnText.style.display = 'none';
                spinner.style.display = 'inline-block';
                downloadBtn.querySelector('.btn-shine').style.display = 'none';
            } else {
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
                downloadBtn.querySelector('.btn-shine').style.display = 'block';
            }
        }

        function updateProgress(percent, text) {
            progressContainer.classList.add('show');
            progressBar.style.width = percent + '%';
            progressText.textContent = text || `جاري التحميل... ${percent}%`;
        }

        function resetProgress() {
            progressContainer.classList.remove('show');
            progressBar.style.width = '0%';
            progressText.textContent = 'جاري التحميل... 0%';
        }

        function resetPreview() {
            previewSection.classList.remove('show');
            currentVideoData = null;
            resetProgress();
        }

        // ==================== API Call ====================
        async function fetchAndDownload() {
            const url = videoUrlInput.value.trim();
            if (!url || !isValidTikTokUrl(url)) {
                showToast('❌ الرجاء إدخال رابط تيك توك صحيح', 'error');
                return;
            }

            setLoading(true);
            resetProgress();
            resetPreview();

            try {
                // Fetch video info from TikWM API
                const apiUrl = `${TIKWM_API}?url=${encodeURIComponent(url)}`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.code !== 0 || !data.data) {
                    throw new Error(data.msg || 'فشل في جلب معلومات الفيديو');
                }

                const videoData = data.data;

                // Store video data
                currentVideoData = {
                    videoUrl: videoData.play || videoData.hdplay,
                    watermarkUrl: videoData.wmplay,
                    thumbnail: videoData.cover || videoData.origin_cover,
                    title: videoData.title || 'فيديو تيك توك',
                    author: videoData.author?.nickname || 'مستخدم تيك توك',
                    duration: videoData.duration || 0,
                    music: videoData.music_info?.title || ''
                };

                if (!currentVideoData.videoUrl) {
                    throw new Error('لم يتم العثور على رابط الفيديو بدون علامة مائية');
                }

                // Show preview
                showPreview(currentVideoData);

                // Auto download
                await downloadVideoDirect(currentVideoData.videoUrl, currentVideoData.title);

            } catch (error) {
                console.error('Error:', error);
                showToast('❌ ' + (error.message || 'حدث خطأ أثناء معالجة الرابط'), 'error');
                resetPreview();
            } finally {
                setLoading(false);
            }
        }

        function showPreview(data) {
            previewTitle.textContent = data.title;
            previewThumbnail.src = data.thumbnail;
            previewThumbnail.onerror = function() {
                this.src = 'data:image/svg+xml,' + encodeURIComponent(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" fill="%23333">
                        <rect width="400" height="600" fill="%231a1a1a"/>
                        <text x="200" y="300" text-anchor="middle" fill="%23555" font-size="20">🎬 معاينة الفيديو</text>
                    </svg>
                `);
            };
            previewSection.classList.add('show');
        }

        // ==================== Download ====================
        async function downloadVideoDirect(videoUrl, title) {
            if (!videoUrl) {
                showToast('❌ رابط الفيديو غير متوفر', 'error');
                return;
            }

            resetProgress();
            updateProgress(0, 'جاري بدء التحميل...');

            try {
                // Fetch the video as blob with progress
                const response = await fetch(videoUrl);
                
                if (!response.ok) {
                    throw new Error('فشل تحميل الفيديو من الخادم');
                }

                const contentLength = response.headers.get('content-length');
                const total = contentLength ? parseInt(contentLength, 10) : 0;
                
                const reader = response.body.getReader();
                const chunks = [];
                let received = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    chunks.push(value);
                    received += value.length;

                    if (total > 0) {
                        const percent = Math.round((received / total) * 100);
                        const downloadedMB = (received / (1024 * 1024)).toFixed(1);
                        const totalMB = (total / (1024 * 1024)).toFixed(1);
                        updateProgress(percent, `جاري التحميل... ${percent}% (${downloadedMB}MB / ${totalMB}MB)`);
                    } else {
                        const downloadedMB = (received / (1024 * 1024)).toFixed(1);
                        updateProgress(0, `جاري التحميل... ${downloadedMB}MB`);
                    }
                }

                // Create blob and download
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const blobUrl = URL.createObjectURL(blob);

                // Sanitize filename
                const safeTitle = (title || 'tiktok_video')
                    .replace(/[\\/:*?"<>|]/g, '_')
                    .replace(/\s+/g, '_')
                    .substring(0, 100);

                const fileName = `TikSaver_${safeTitle}_${Date.now()}.mp4`;

                // Trigger download
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = fileName;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                // Cleanup
                setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);

                // Update stats
                downloadCount++;
                localStorage.setItem('tiktokDownloadCount', downloadCount.toString());
                totalDownloadsEl.textContent = downloadCount;

                updateProgress(100, '✅ تم التحميل بنجاح!');
                showToast('✅ تم تحميل الفيديو بنجاح بدون علامة مائية!', 'success');

                // Reset progress after delay
                setTimeout(() => {
                    if (!isDownloading) {
                        resetProgress();
                    }
                }, 3000);

            } catch (error) {
                console.error('Download error:', error);
                updateProgress(0, 'فشل التحميل');
                showToast('❌ فشل تحميل الفيديو. حاول مرة أخرى.', 'error');
                resetProgress();
            }
        }

        // ==================== Share ====================
        async function shareVideo() {
            if (!currentVideoData?.videoUrl) {
                showToast('❌ لا يوجد فيديو للمشاركة', 'error');
                return;
            }

            try {
                if (navigator.share) {
                    await navigator.share({
                        title: currentVideoData.title,
                        text: `شاهد هذا الفيديو من تيك توك: ${currentVideoData.title}`,
                        url: currentVideoData.videoUrl
                    });
                } else {
                    // Fallback: copy link
                    await navigator.clipboard.writeText(currentVideoData.videoUrl);
                    showToast('📋 تم نسخ رابط الفيديو للمشاركة', 'success');
                }
            } catch (err) {
                if (err.name !== 'AbortError') {
                    // Fallback
                    try {
                        await navigator.clipboard.writeText(currentVideoData.videoUrl);
                        showToast('📋 تم نسخ الرابط للمشاركة', 'success');
                    } catch (e) {
                        showToast('❌ تعذرت المشاركة', 'error');
                    }
                }
            }
        }

        // ==================== Toast ====================
        function showToast(message, type = '') {
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ==================== Keyboard Shortcut ====================
        document.addEventListener('keydown', (e) => {
            // Ctrl+V or Cmd+V to paste
            if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
                if (document.activeElement !== videoUrlInput) {
                    e.preventDefault();
                    pasteFromClipboard();
                }
            }
            // Enter to download
            if (e.key === 'Enter' && document.activeElement === videoUrlInput) {
                e.preventDefault();
                if (!isDownloading && isValidTikTokUrl(videoUrlInput.value.trim())) {
                    fetchAndDownload();
                }
            }
        });

        // ==================== Initialization ====================
        // Check if there's a URL in the clipboard on load
        window.addEventListener('load', async () => {
            try {
                const clipText = await navigator.clipboard.readText();
                if (clipText && isValidTikTokUrl(clipText.trim())) {
                    videoUrlInput.value = clipText.trim();
                    handleInputChange();
                    showToast('🔗 تم اكتشاف رابط تيك توك في الحافظة', 'success');
                }
            } catch (e) {
                // Clipboard not accessible
            }
        });

        console.log('🚀 TikSaver جاهز - حمّل فيديوهات تيك توك بدون علامة مائية');
        console.log('📌 مميزات:');
        console.log('  ✅ تحميل بدون علامة مائية');
        console.log('  ✅ جودة HD');
        console.log('  ✅ معاينة قبل التحميل');
        console.log('  ✅ دعم الروابط المختصرة');
        console.log('  ✅ مشاركة مباشرة');
        console.log('👨‍💻 Developed with ❤️');
    </script>
</body>
